    <script>
      const SUPABASE_URL = "https://yiosbqaneavohaogmipb.supabase.co";

          const stateCode = document.getElementById("state_code").value;
          const file = image.files[0];

          if (

          ) {

      /* NAV */

      };

      document.getElementById("loginBtn").onclick = async () => {

        if (pass !== "clo2026") {

      function filterByCDS(cds) {
        const filtered = allData.filter((item) => item.cds_group === cds);

        visibleData = filtered;
        currentPage = 1; // reset page

        renderTable();
        renderPagination();
      }
      function renderTable() {
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;

        const pageData = visibleData.slice(start, end);

        document.getElementById("tableBody").innerHTML = `
    <div style="
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:15px;
      margin-top:20px;
    ">
      ${pageData
        .map(
          (row) => `
        <div style="
          border:1px solid #ddd;
          border-radius:10px;
          padding:10px;
          text-align:center;
          background:white;
        ">
          <img 
            src="${row.image_url}" 
            loading="lazy"
            decoding="async"
            style="width:100%; height:160px; object-fit:cover; border-radius:8px;"
          />

          <div style="margin-top:8px; font-weight:bold;">
            ${row.full_name}
          </div>

          <div style="font-size:12px;">
            Batch: ${row.batch}
          </div>

          <div style="font-size:12px;">
            CDS: ${row.cds_group}
          </div>
          <div style="font-size:12px;">
            CDS: ${row.phone_number}
          </div>

          ${
            row.state_code
              ? `<div style="font-size:12px;">Matric: ${row.state_code}</div>`
              : ""
          }
        </div>
      `,
        )
        .join("")}
    </div>
  `;
      }
      document.getElementById("zipBtn").onclick = async function () {
        const zip = new JSZip();
        const folderName = this.dataset.cds || "cds";

        const folder = zip.folder(folderName);

        for (let i = 0; i < visibleData.length; i++) {
          const row = visibleData[i];

          try {
            const response = await fetch(row.image_url);
            const blob = await response.blob();

            const urlParts = row.image_url.split("?");
            const path = urlParts[0];

            const ext = path.substring(path.lastIndexOf(".") + 1);

            const fileName = `${row.state_code || "NO_CODE"}_${row.phone_number || i}.${ext}`;

            folder.file(fileName, blob);
          } catch (err) {
            console.log("failed image:", row.image_url);
          }
        }

        const content = await zip.generateAsync({ type: "blob" });

        saveAs(content, `${folderName}.zip`);
      };

      function renderPagination() {
        const totalPages = Math.ceil(visibleData.length / pageSize);

        let buttons = "";

        for (let i = 1; i <= totalPages; i++) {
          buttons += `
      <button onclick="goToPage(${i})"
        style="
          margin:3px;
          padding:8px 12px;
          width:auto;
          background:${i === currentPage ? "#16a34a" : "#111827"};
        ">
        ${i}
      </button>
    `;
        }

        document.getElementById("pagination").innerHTML = buttons;
      }

      function goToPage(page) {
        currentPage = page;
        renderTable();
        renderPagination();
      }
      /* LOAD */
      async function loadRecords() {
        const { data, error } = await client
          .from("registrations")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          console.log(error);
          return;
        }

        allData = data;

        const cdsGroups = [...new Set(data.map((item) => item.cds_group))];

        document.getElementById("cdsList").innerHTML = cdsGroups
          .map(
            (cds) => `
        <button onclick="filterByCDS('${cds}')" style="margin:5px;padding:10px;width:auto;">
          ${cds}
        </button>
      `,
          )
          .join("");

        renderTable(data);
      }
      async function loadRecords() {
        const { data, error } = await client
          .from("registrations")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          console.log(error);
          return;
        }

        allData = data;

        const cdsGroups = [...new Set(data.map((item) => item.cds_group))];

        document.getElementById("cdsList").innerHTML = cdsGroups
          .map(
            (cds) => `
        <button onclick="filterByCDS('${cds}')" 
          style="margin:5px;padding:10px;width:auto;">
          ${cds}
        </button>
      `,
          )
          .join("");

        renderTable(data);
        renderPagination();
      }
      function toBase64(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";

          img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);

            resolve(canvas.toDataURL("image/jpeg"));
          };

          img.onerror = reject;
          img.src = url;
        });
      }
      /* PDF */
      downloadBtn.onclick = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const rows = await Promise.all(
          visibleData.map(async (row) => {
            let img = "";

            try {
              img = await toBase64(row.image_url);
            } catch (e) {
              img = "";
            }

            return [row.full_name, row.batch, row.cds_group, img];
          }),
        );

        doc.autoTable({
          head: [["Name", "Batch", "Group", "Image"]],
          body: rows,

          // 🔥 REMOVE ALL COLOR/STYLING
          styles: {
            fontSize: 10,
            textColor: 0, // black text
            lineColor: 0, // black borders
            lineWidth: 0.1,
            fillColor: false, // no background color
          },

          headStyles: {
            fillColor: false, // no header color
            textColor: 0,
          },

          columnStyles: {
            3: { cellWidth: 25 }, // image column
          },

          didDrawCell: function (data) {
            if (
              data.section === "body" &&
              data.column.index === 3 &&
              data.cell.raw
            ) {
              doc.addImage(
                data.cell.raw,
                "JPEG",
                data.cell.x + 2,
                data.cell.y + 2,
                15,
                15,
              );
            }
          },
        });

        doc.save("cds-report.pdf");
      };
